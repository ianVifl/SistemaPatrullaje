<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard Monocromo - Sistema de Patrullaje</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Monocromo minimalista: blanco y negro */
    :root{color-scheme: light}
    html,body{height:100%;margin:0}
    body{
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:#fff;color:#000;
      display:flex;align-items:flex-start;justify-content:center;padding:24px;
    }
    .card{width:100%;max-width:900px;border:1px solid #000;padding:18px;border-radius:8px;box-shadow:none}
    h1{margin:0 0 8px 0;font-size:20px}
    p.subtitle{margin:0 0 16px 0;color:#222;font-size:13px}
    .status{font-weight:600;margin-bottom:12px}
    .grid{display:flex;gap:16px;align-items:flex-start}
    .left{flex:1}
    .right{width:260px}
    canvas{width:100%!important;height:260px!important}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    th,td{padding:8px;border-bottom:1px solid #e6e6e6;text-align:left;font-size:14px}
    th{font-weight:700}
    .muted{color:#444;font-size:13px}
    .footer{margin-top:14px;font-size:12px;color:#333}
    .small-note{color:#666;font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Sistema Inteligente de Patrullaje</h1>
    <p class="subtitle">Vista minimalista monocromática — Top 3 sectores con mayor incidencia</p>

    <div class="status">KAFKA • ZOOKEEPER • BD • API</div>

    <div class="grid">
      <div class="left">
        <canvas id="barChart"></canvas>
      </div>
      <div class="right">
        <div class="muted">Top 3 Sectores</div>
        <table id="topTable" aria-live="polite">
          <thead><tr><th>Sector</th><th>Total</th></tr></thead>
          <tbody>
            <tr><td colspan="2" class="small-note">Cargando datos...</td></tr>
          </tbody>
        </table>
        <div class="footer">Actualización: <span id="lastUpdated">--</span></div>
      </div>
    </div>

    <div class="small-note">Este panel obtiene datos de <code>/api/v1/analitica/top-sectores</code> (mismo servidor).</div>
  </div>

  <script>
    const endpoint = '/api/v1/analitica/top-sectores';
    let chart = null;

    function renderTable(data){
      const tbody = document.querySelector('#topTable tbody');
      tbody.innerHTML = '';
      if(!data || data.length===0){
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="2" class="small-note">No hay datos</td>';
        tbody.appendChild(tr);
        return;
      }
      data.forEach(item=>{
        const tr = document.createElement('tr');
        const sector = document.createElement('td'); sector.textContent = item.sector;
        const total = document.createElement('td'); total.textContent = item.totalDelitos ?? item.total ?? 0;
        tr.appendChild(sector); tr.appendChild(total);
        tbody.appendChild(tr);
      });
    }

    async function fetchAndRender(){
      try{
        const res = await fetch(endpoint, {cache: 'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Normalizar nombres de campo (por si el DTO usa 'total' o 'totalDelitos')
        const labels = data.map(d => d.sector);
        const values = data.map(d => Number(d.totalDelitos ?? d.total ?? 0));

        // actualizar tabla
        renderTable(data);

        // actualizar gráfico
        const ctx = document.getElementById('barChart').getContext('2d');
        if(chart){
          chart.data.labels = labels;
          chart.data.datasets[0].data = values;
          chart.update();
        } else {
          chart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{
                label: 'Incidentes',
                data: values,
                backgroundColor: '#000',
                borderColor: '#000',
                borderWidth: 1
              }]
            },
            options: {
              responsive: true,
              plugins: { legend: { display: false } },
              scales: {
                x: { ticks: { color: '#000' }, grid: { display: false } },
                y: { ticks: { color: '#000' }, grid: { color: '#eaeaea' }, beginAtZero: true }
              }
            }
          });
        }

        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
      }catch(err){
        console.error('Error trayendo datos:', err);
        const tbody = document.querySelector('#topTable tbody');
        tbody.innerHTML = '<tr><td colspan="2" class="small-note">Error al obtener datos</td></tr>';
      }
    }

    // Ejecutar al inicio y luego cada 3 segundos
    fetchAndRender();
    setInterval(fetchAndRender, 3000);
  </script>
</body>
</html>
